name: GHL API Drift

on:
  pull_request:
    paths:
      - "scripts/scan-ghl-api-coverage.mjs"
      - "scripts/generate-official-spec-tools.mjs"
      - "scripts/classify-local-endpoints.mjs"
      - "src/**"
      - "docs/GHL-API-COVERAGE-REPORT.md"
      - "docs/GHL-LOCAL-ENDPOINT-CLASSIFICATION.md"
      - "docs/ghl-api-coverage.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ghl-api-drift.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/scan-ghl-api-coverage.mjs"
      - "scripts/generate-official-spec-tools.mjs"
      - "scripts/classify-local-endpoints.mjs"
      - "src/**"
      - "docs/GHL-API-COVERAGE-REPORT.md"
      - "docs/GHL-LOCAL-ENDPOINT-CLASSIFICATION.md"
      - "docs/ghl-api-coverage.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ghl-api-drift.yml"
  schedule:
    # Daily at 9:20 AM UTC. GitHub schedules are UTC and can be delayed under load.
    - cron: "20 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    name: Scan API coverage drift
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scanner and fail on uncommitted drift
        run: |
          npm run scan:ghl-api
          git diff -- \
            docs/GHL-API-COVERAGE-REPORT.md \
            docs/GHL-LOCAL-ENDPOINT-CLASSIFICATION.md \
            docs/ghl-api-coverage.json \
            src/tools/official-spec-tools.ts \
            src/tools/official-spec-endpoints.json
          if [ -n "$(git status --porcelain -- docs/GHL-API-COVERAGE-REPORT.md docs/GHL-LOCAL-ENDPOINT-CLASSIFICATION.md docs/ghl-api-coverage.json src/tools/official-spec-tools.ts src/tools/official-spec-endpoints.json)" ]; then
            echo "GHL API coverage artifacts changed. Run npm run scan:ghl-api and commit the results."
            git status --short -- docs/GHL-API-COVERAGE-REPORT.md docs/GHL-LOCAL-ENDPOINT-CLASSIFICATION.md docs/ghl-api-coverage.json src/tools/official-spec-tools.ts src/tools/official-spec-endpoints.json
            exit 1
          fi

  daily-update:
    name: Daily GHL API update PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh GHL API artifacts
        run: npm run scan:ghl-api

      - name: Create PR when GHL API artifacts change
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/daily-ghl-api-refresh
          delete-branch: true
          commit-message: "chore: refresh GHL API artifacts"
          title: "chore: refresh GHL API artifacts"
          body: |
            Automated daily refresh of the GoHighLevel API docs snapshot and generated MCP coverage artifacts.

            Generated by `npm run scan:ghl-api`.
          labels: |
            automation
            ghl-api
          add-paths: |
            docs/GHL-API-COVERAGE-REPORT.md
            docs/GHL-LOCAL-ENDPOINT-CLASSIFICATION.md
            docs/ghl-api-coverage.json
            src/tools/official-spec-tools.ts
            src/tools/official-spec-endpoints.json
